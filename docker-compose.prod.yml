version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: china-ru-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-china_ru_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: china_ru
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - china-ru-network-prod
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-china_ru_user} -d china_ru']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: china-ru-redis-prod
    volumes:
      - redis_data_prod:/data
    networks:
      - china-ru-network-prod
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: china-ru-meilisearch-prod
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meilisearch_data_prod:/meili_data
    networks:
      - china-ru-network-prod
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: china-ru-minio-prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_prod:/minio_data
    networks:
      - china-ru-network-prod
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: china-ru-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-china_ru_user}:${POSTGRES_PASSWORD}@postgres:5432/china_ru
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_HOST: http://meilisearch:7700
      S3_ENDPOINT: http://minio:9000
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - china-ru-network-prod
    expose:
      - '3001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: china-ru-web
    environment:
      NEXT_PUBLIC_API_URL: https://api.china-ru.ru
    depends_on:
      - api
    networks:
      - china-ru-network-prod
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - '80:80'
      - '443:443'
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:
  meilisearch_data_prod:
  minio_data_prod:

networks:
  china-ru-network-prod:
    driver: bridge

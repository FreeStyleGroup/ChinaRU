version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: china-ru-postgres
    environment:
      POSTGRES_USER: china_ru_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: china_ru
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - china-ru-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U china_ru_user -d china_ru']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: china-ru-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - china-ru-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: china-ru-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev_master_key
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - china-ru-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: china-ru-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/minio_data
    networks:
      - china-ru-network
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  china-ru-network:
    driver: bridge
